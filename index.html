<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Long Walk Home</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="fog fog-a"></div>
  <div class="fog fog-b"></div>
  <div class="crt"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <main class="shell" id="app">
    <section class="title-screen" id="titleScreen">
      <p class="kicker">A psychological horror text adventure</p>
      <h1>The Long Walk Home</h1>
      <p class="subtitle">Your shift ended twelve hours after it started. The fog has swallowed the road home.</p>
      <div class="title-actions">
        <button class="primary" id="newGameButton">New Walk</button>
        <button id="continueButton">Continue</button>
        <button id="slotsButton">Save Slots</button>
        <button id="resetButton">Reset Save</button>
      </div>
      <div class="settings-row">
        <label><input type="checkbox" id="reducedMotionToggle"> Reduce motion</label>
        <label><input type="checkbox" id="skipTypeToggle"> Skip typewriter</label>
        <button id="fullscreenButton" aria-label="Toggle fullscreen">Fullscreen</button>
      </div>
    </section>

    <section class="game-screen hidden" id="gameScreen" aria-live="polite">
      <aside class="menu-rail">
        <p class="kicker">The Long Walk Home</p>
        <button id="menuButton" aria-label="Return to title">Menu</button>
        <button id="manualSaveButton">Save</button>
        <button id="quickSaveButton">Quick Save</button>
        <button id="quickLoadButton">Quick Load</button>
        <button id="gameSlotsButton">Slots</button>
        <button id="exportSaveButton">Export</button>
        <label class="import-control">
          Import
          <input type="file" id="importSaveInput" accept="application/json,.json">
        </label>
      </aside>

      <section class="media-column">
        <header class="scene-heading">
          <p class="chapter" id="chapterLabel">Chapter 1</p>
          <h2 id="sceneTitle">Leaving Work</h2>
        </header>
        <figure class="scene-visual" id="sceneVisual"></figure>
        <nav class="thumbnail-strip" id="thumbnailStrip" aria-label="Nearby locations"></nav>
      </section>

      <section class="story-column">
        <div class="top-actions">
          <button id="muteButton" aria-label="Toggle sound">Sound On</button>
          <button id="skipButton">Skip Text</button>
          <button id="achievementsButton">Endings</button>
        </div>
        <article class="story-panel">
          <div class="story-text" id="storyText"></div>
        </article>
        <section class="status-panel">
          <div>
            <span>Fear</span>
            <strong id="fearMeter">-----</strong>
          </div>
          <div>
            <span>Battery</span>
            <strong id="batteryMeter">15%</strong>
          </div>
          <div>
            <span>Inventory</span>
            <strong id="inventoryList">Empty</strong>
          </div>
        </section>
        <nav class="choices" id="choices"></nav>
      </section>
    </section>

    <section class="ending-sequence hidden" id="endingSequence" aria-live="polite" aria-label="Ending sequence">
      <div class="ending-line" id="endingLine"></div>
      <div class="credits-roll hidden" id="creditsRoll"></div>
    </section>

    <dialog id="endingDialog">
      <h3>Unlocked Endings</h3>
      <ul id="endingList"></ul>
      <button id="closeEndingsButton">Close</button>
    </dialog>

    <dialog id="saveDialog">
      <h3>Save Slots</h3>
      <div class="save-list" id="saveList"></div>
      <button id="closeSaveDialogButton">Close</button>
    </dialog>
  </main>

  <script src="scenes.js"></script>
  <script src="config/assets.js"></script>
  <script src="config/audio.js"></script>
  <script src="config/theme.js"></script>
  <script src="save.js"></script>
  <script src="audio.js"></script>
  <script src="ui.js"></script>
  <script src="menu-music.js"></script>
  <script src="game.js"></script>
</body>
</html>
